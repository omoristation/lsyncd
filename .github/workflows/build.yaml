name: build-lsyncd-static

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            musl-tools \
            wget \
            xz-utils

      - name: Download lsyncd release
        run: |
          wget https://github.com/lsyncd/lsyncd/archive/refs/tags/release-2.2.3.tar.gz
          tar xf release-2.2.3.tar.gz
          mv lsyncd-release-2.2.3 lsyncd

      - name: Build Lua static
        run: |
          wget https://www.lua.org/ftp/lua-5.3.6.tar.gz
          tar xf lua-5.3.6.tar.gz
          cd lua-5.3.6/src
          make CC=musl-gcc MYCFLAGS="-fPIC" liblua.a -j2

      - name: Build lsyncd
        run: |
          cd lsyncd

          ./configure \
            CC=musl-gcc \
            CFLAGS="-O2 -static" \
            LUA_CFLAGS="-I../lua-5.3.6/src" \
            LUA_LIBS="../lua-5.3.6/src/liblua.a -lm -ldl"

          make -j2

      - name: Package
        run: |
          mkdir release
          cp lsyncd/lsyncd release/lsyncd-linux-amd64
          strip release/lsyncd-linux-amd64

      - name: SHA256
        run: |
          cd release
          sha256sum lsyncd-linux-amd64 > lsyncd-linux-amd64.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lsyncd
          path: release/*