name: Build Static Lsyncd

on:
  push:
    tags:
      - 'v*' # 当你推送标签如 v2.3.1 时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake lua5.3 liblua5.3-dev build-essential

      - name: Static Compilation
        run: |
          mkdir build && cd build
          # 1. 禁用 MANPAGE 避免 a2x 报错
          # 2. 强制静态链接
          cmake -DLUA_LIBRARIES=/usr/lib/x86_64-linux-gnu/liblua5.3.a \
                -DLUA_INCLUDE_DIR=/usr/include/lua5.3 \
                -DMANPAGE=OFF \
                -DCMAKE_EXE_LINKER_FLAGS="-static" ..
          make
          # 3. 验证是否真的是静态链接（可选）
          ldd lsyncd || echo "Static build confirmed"

      - name: Release Binary
        uses: softprops/action-gh-release@v1
        with:
          files: build/lsyncd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}