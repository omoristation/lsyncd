name: Build lsyncd static

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential autoconf automake libtool git

    - name: Build Lua
      run: |
        git clone https://github.com/lua/lua.git
        cd lua
        git checkout v5.3.6
        make linux MYCFLAGS="-fPIC"

    - name: Build lsyncd
      run: |
        ./autogen.sh
        ./configure \
        LUA_CFLAGS="-I../lua/src" \
        LUA_LIBS="../lua/src/liblua.a -lm -ldl" \
        --enable-static \
        --disable-shared
        make

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: lsyncd
        path: src/lsyncd

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: src/lsyncd