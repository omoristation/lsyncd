name: Build lsyncd static

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:

  build:
    name: build-${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            wget \
            musl-tools \
            gcc-aarch64-linux-gnu

      - name: Set compiler
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "CC=musl-gcc" >> $GITHUB_ENV
          else
            echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build Lua
        run: |
          wget https://www.lua.org/ftp/lua-5.3.6.tar.gz
          tar xzf lua-5.3.6.tar.gz
          cd lua-5.3.6/src
          make CC=$CC MYCFLAGS="-fPIC" liblua.a

      - name: Prepare lsyncd build
        run: |
          autoreconf -fvi

      - name: Build lsyncd
        run: |
          ./configure \
            CC=$CC \
            CFLAGS="-static -O2" \
            LUA_CFLAGS="-I../lua-5.3.6/src" \
            LUA_LIBS="../lua-5.3.6/src/liblua.a -lm -ldl"

          make -j2

      - name: Strip binary
        run: |
          mkdir release
          cp src/lsyncd release/lsyncd-linux-${{ matrix.arch }}
          strip release/lsyncd-linux-${{ matrix.arch }}

      - name: Generate SHA256
        run: |
          cd release
          sha256sum lsyncd-linux-${{ matrix.arch }} > lsyncd-linux-${{ matrix.arch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lsyncd-${{ matrix.arch }}
          path: release/*


  release:

    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mkdir release
          cp lsyncd-amd64/* release/
          cp lsyncd-arm64/* release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}